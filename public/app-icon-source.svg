    <path d="M256 96v320" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity="0.5"></path>
    <path d="M288 96v320" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity="0.5"></path>

