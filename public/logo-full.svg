<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" fill="none">
  <!-- SYMBOL (scaled from 512 to 300) -->
  <g transform="translate(40,60)">
    <!-- Moldura externa (scaled: 400*0.75=300, stroke 16*0.75=12) -->
    <rect x="33" y="33" width="234" height="234" rx="28" stroke="#0F172A" stroke-width="12" fill="none"/>
    
    <!-- Linhas horizontais (scaled positions and stroke) -->
    <path d="M80 103h140" stroke="#0F172A" stroke-width="10" stroke-linecap="round"/>
    <path d="M80 150h140" stroke="#0F172A" stroke-width="10" stroke-linecap="round"/>
    <path d="M80 197h140" stroke="#0F172A" stroke-width="10" stroke-linecap="round"/>
    
    <!-- Linhas verticais (scaled) -->
    <path d="M127 80v140" stroke="#0F172A" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
    <path d="M150 80v140" stroke="#0F172A" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
    <path d="M173 80v140" stroke="#0F172A" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
    
    <!-- Nós (scaled positions) -->
    <circle cx="80" cy="103" r="10" fill="#0F172A"/>
    <circle cx="220" cy="150" r="10" fill="#0F172A"/>
    <circle cx="127" cy="197" r="10" fill="#0F172A"/>
    
    <!-- Acento azul (scaled) -->
    <circle cx="173" cy="103" r="7" fill="#2563EB"/>
  </g>

  <!-- TEXT -->
  <text x="380" y="190" font-family="Inter, Arial, sans-serif" font-size="120" font-weight="800" fill="#0F172A" dominant-baseline="alphabetic">
    Visita<tspan fill="#2563EB">Prova</tspan>
  </text>

  <!-- SUBTITLE -->
  <text x="380" y="270" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="500" fill="#475569" dominant-baseline="alphabetic">Registro de intermediação</text>
</svg>